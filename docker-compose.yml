version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskbunny
      POSTGRES_USER: taskbunny
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskbunny_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/server/src/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taskbunny']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://taskbunny:${DB_PASSWORD:-taskbunny_dev}@postgres:5432/taskbunny
      JWT_SECRET: ${JWT_SECRET:-dev_secret_min_32_chars_here}
      PORT: 3000
      NODE_ENV: production
      RATE_LIMIT_MAX_PER_DEVICE: 5000
      SYNC_BATCH_FLUSH_INTERVAL_MS: 200
      SYNC_BATCH_MAX_SIZE: 100
    ports:
      - '3000:3000'
    restart: unless-stopped

volumes:
  postgres_data:
